<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Theatrum — one memory palace, every agent">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2c14e"/>
      <stop offset="1" stop-color="#d9982f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f2c14e" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f2c14e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="#161926"/>

  <!-- pediment -->
  <path d="M256 92 L424 184 H88 Z" fill="none" stroke="url(#gold)"
        stroke-width="20" stroke-linejoin="round"/>

  <!-- outer columns -->
  <line x1="136" y1="224" x2="136" y2="384" stroke="url(#gold)"
        stroke-width="20" stroke-linecap="round"/>
  <line x1="376" y1="224" x2="376" y2="384" stroke="url(#gold)"
        stroke-width="20" stroke-linecap="round"/>

  <!-- doorway of the palace -->
  <path d="M200 384 L200 288 A56 56 0 0 1 312 288 L312 384"
        fill="none" stroke="url(#gold)" stroke-width="20" stroke-linecap="round"/>

  <!-- the memory inside: glow + core -->
  <circle cx="256" cy="318" r="46" fill="url(#glow)"/>
  <circle cx="256" cy="318" r="20" fill="url(#gold)"/>

  <!-- stylobate -->
  <line x1="96" y1="412" x2="416" y2="412" stroke="url(#gold)"
        stroke-width="20" stroke-linecap="round"/>
</svg>
